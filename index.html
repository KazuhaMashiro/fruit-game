<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Fruit Catcher</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8.5/dist/teachablemachine-pose.min.js"></script>

<style>
body{
    margin:0;
    overflow:hidden;
    font-family:Arial;
}

#gameCanvas{
    position:absolute;
    inset:0;
}

#webcam{
    position:absolute;
    top:20px;
    left:20px;
    width:250px;
    height:180px;
    border:4px solid white;
    border-radius:15px;
    object-fit:cover;
    transform:scaleX(-1);
    z-index:10;
}

#prediction{
    position:absolute;
    top:210px;
    left:20px;
    color:white;
    font-size:28px;
    font-weight:bold;
    z-index:10;
}

#score{
    position:absolute;
    right:20px;
    top:20px;
    color:white;
    font-size:40px;
    font-weight:bold;
}

#lives{
    position:absolute;
    right:20px;
    top:80px;
    color:white;
    font-size:40px;
}
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<video id="webcam" autoplay playsinline muted></video>

<div id="prediction">Loading...</div>

<div id="score">Score: 0</div>

<div id="lives">❤️❤️❤️</div>

<script>

const MODEL_URL = "./model.json";
const METADATA_URL = "./metadata.json";

model = await tmPose.load(
    MODEL_URL,
    METADATA_URL
);
let model;
let score = 0;
let misses = 0;

const video = document.getElementById("webcam");
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let bowl = {
    x: canvas.width / 2,
    y: canvas.height - 120,
    width: 160,
    height: 70
};

let fruits = [];

function spawnFruit() {

    const emojis = ["🍎","🍌","🍊","🍇"];

    fruits.push({
        x: Math.random() * (canvas.width - 100) + 50,
        y: -50,
        speed: 3 + Math.random() * 3,
        emoji: emojis[Math.floor(Math.random() * emojis.length)]
    });

}

setInterval(spawnFruit, 1000);

async function init() {

    console.log("Loading model...");

    model = await tmPose.load(
        MODEL_URL + "model.json",
        MODEL_URL + "metadata.json"
    );

    console.log("Model loaded");

    const stream =
        await navigator.mediaDevices.getUserMedia({
            video: true
        });

    video.srcObject = stream;

    video.onloadeddata = () => {

        console.log("Video ready");

        requestAnimationFrame(loop);

    };

}

async function predict() {

    if (video.readyState < 2) {
        return;
    }

    const { posenetOutput } =
        await model.estimatePose(video);

    const prediction =
        await model.predict(posenetOutput);

    const left =
        prediction.find(
            p => p.className === "left"
        )?.probability || 0;

    const right =
        prediction.find(
            p => p.className === "right"
        )?.probability || 0;

    if (left > 0.9 && left > right) {
        bowl.x -= 15;
    }

    if (right > 0.9 && right > left) {
        bowl.x += 15;
    }

    bowl.x = Math.max(
        80,
        Math.min(canvas.width - 80, bowl.x)
    );

    document.getElementById("prediction").innerText =
        left > right
            ? "LEFT " + Math.round(left * 100) + "%"
            : "RIGHT " + Math.round(right * 100) + "%";
}

function drawBackground() {

    const gradient =
        ctx.createLinearGradient(
            0, 0, 0, canvas.height
        );

    gradient.addColorStop(0, "#9b6b3d");
    gradient.addColorStop(1, "#6b3e1f");

    ctx.fillStyle = gradient;
    ctx.fillRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    ctx.strokeStyle =
        "rgba(255,255,255,0.05)";

    for(let i = 0; i < canvas.width; i += 100){

        ctx.beginPath();
        ctx.moveTo(i,0);
        ctx.lineTo(i,canvas.height);
        ctx.stroke();

    }

}

function drawGame() {

    drawBackground();

    ctx.font = "50px serif";

    for(let i = fruits.length - 1; i >= 0; i--){

        let fruit = fruits[i];

        fruit.y += fruit.speed;

        ctx.fillText(
            fruit.emoji,
            fruit.x,
            fruit.y
        );

        if(
            fruit.y > bowl.y - 20 &&
            fruit.x > bowl.x - 80 &&
            fruit.x < bowl.x + 80
        ){

            score++;

            document.getElementById(
                "score"
            ).innerText =
                "Score: " + score;

            fruits.splice(i,1);

            continue;
        }

        if(
            fruit.y >
            canvas.height + 50
        ){

            misses++;

            fruits.splice(i,1);

            document.getElementById(
                "lives"
            ).innerText =
                "❤️".repeat(
                    Math.max(0, 3 - misses)
                );

            if(misses >= 3){

                alert(
                    "Game Over!\nScore: " + score
                );

                location.reload();
            }
        }

    }

    ctx.fillStyle = "#5c2f13";

    ctx.beginPath();

    ctx.ellipse(
        bowl.x,
        bowl.y,
        80,
        35,
        0,
        0,
        Math.PI * 2
    );

    ctx.fill();

}

async function loop() {

    try {

        if(video.readyState >= 2){

            await predict();

            drawGame();
        }

    } catch(error){

        console.error(error);

    }

    requestAnimationFrame(loop);

}

init();

</script>
</body>
</html>
