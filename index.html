<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Fruit Catcher</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@latest"></script>

<style>
body{
    margin:0;
    overflow:hidden;
    font-family:Arial;
}

#gameCanvas{
    position:absolute;
    inset:0;
}

#webcam{
    position:absolute;
    top:20px;
    left:20px;
    width:250px;
    height:180px;
    border:4px solid white;
    border-radius:15px;
    object-fit:cover;
    transform:scaleX(-1);
    z-index:10;
}

#prediction{
    position:absolute;
    top:210px;
    left:20px;
    color:white;
    font-size:28px;
    font-weight:bold;
    z-index:10;
}

#score{
    position:absolute;
    right:20px;
    top:20px;
    color:white;
    font-size:40px;
    font-weight:bold;
}

#lives{
    position:absolute;
    right:20px;
    top:80px;
    color:white;
    font-size:40px;
}
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<video id="webcam" autoplay playsinline muted></video>

<div id="prediction">Loading...</div>

<div id="score">Score: 0</div>

<div id="lives">❤️❤️❤️</div>

<script>

const MODEL_URL =
"https://teachablemachine.withgoogle.com/models/hAoLBlbtq/";

let model;
let score=0;
let misses=0;

const video=document.getElementById("webcam");
const canvas=document.getElementById("gameCanvas");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let bowl={
    x:canvas.width/2,
    y:canvas.height-120,
    width:160,
    height:70
};

let fruits=[];

function spawnFruit(){

    const emojis=["🍎","🍌","🍊","🍇"];

    fruits.push({
        x:Math.random()*canvas.width,
        y:-50,
        speed:3+Math.random()*3,
        emoji:emojis[Math.floor(Math.random()*emojis.length)]
    });
}

setInterval(spawnFruit,1000);

async function init(){

    model=await tmPose.load(
        MODEL_URL+"model.json",
        MODEL_URL+"metadata.json"
    );

    const stream=
    await navigator.mediaDevices.getUserMedia({
        video:true
    });

    video.srcObject=stream;

    requestAnimationFrame(loop);
}

async function predict(){

    const {posenetOutput}=
    await model.estimatePose(video);

    const prediction=
    await model.predict(posenetOutput);

    const left=
    prediction.find(
    p=>p.className==="left"
    ).probability;

    const right=
    prediction.find(
    p=>p.className==="right"
    ).probability;

    if(left>0.9){
        bowl.x-=15;
    }

    if(right>0.9){
        bowl.x+=15;
    }

    bowl.x=Math.max(
        80,
        Math.min(
            canvas.width-80,
            bowl.x
        )
    );

    document.getElementById(
    "prediction").innerText=
    left>right
    ? "LEFT "+Math.round(left*100)+"%"
    : "RIGHT "+Math.round(right*100)+"%";
}

function drawBackground(){

    const g=
    ctx.createLinearGradient(
        0,0,0,canvas.height
    );

    g.addColorStop(0,"#8B5A2B");
    g.addColorStop(1,"#5C3317");

    ctx.fillStyle=g;
    ctx.fillRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    for(let i=0;i<20;i++){

        ctx.strokeStyle=
        "rgba(255,255,255,0.05)";

        ctx.beginPath();

        ctx.moveTo(i*100,0);

        ctx.lineTo(
            i*100,
            canvas.height
        );

        ctx.stroke();
    }
}

function drawGame(){

    drawBackground();

    ctx.font="50px serif";

    fruits.forEach((f,index)=>{

        f.y+=f.speed;

        ctx.fillText(
            f.emoji,
            f.x,
            f.y
        );

        if(
            f.y>bowl.y-20 &&
            f.x>bowl.x-70 &&
            f.x<bowl.x+70
        ){

            score++;

            document
            .getElementById(
            "score")
            .innerText=
            "Score: "+score;

            fruits.splice(
            index,
            1
            );
        }

        if(
        f.y>
        canvas.height+50
        ){

            misses++;

            fruits.splice(
            index,
            1
            );

            let hearts=
            "❤️".repeat(
            Math.max(
            0,
            3-misses
            ));

            document
            .getElementById(
            "lives")
            .innerText=
            hearts;

            if(
            misses>=3
            ){
                alert(
                "Game Over!\nScore: "
                +score
                );
                location.reload();
            }
        }

    });

    ctx.fillStyle=
    "#4A2E15";

    ctx.beginPath();

    ctx.ellipse(
        bowl.x,
        bowl.y,
        80,
        35,
        0,
        0,
        Math.PI*2
    );

    ctx.fill();
}

async function loop(){

    await predict();

    drawGame();

    requestAnimationFrame(
    loop
    );
}

init();

</script>

</body>
</html>
