<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>TM Test</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.20.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8.5/dist/teachablemachine-pose.min.js"></script>

<style>
body{
    margin:0;
    background:black;
    color:white;
    font-family:Arial;
}

video{
    width:100vw;
    height:100vh;
    object-fit:cover;
    transform:scaleX(-1);
}

#prediction{
    position:absolute;
    top:20px;
    left:20px;
    font-size:40px;
}
</style>
</head>
<body>

<video id="webcam" autoplay playsinline muted></video>

<div id="prediction">
Loading...
</div>

<script>

const MODEL_URL =
"https://teachablemachine.withgoogle.com/models/hAoLBlbtq/";

let model;
let webcamVideo;

async function init(){

    const modelURL = MODEL_URL + "model.json";
    const metadataURL = MODEL_URL + "metadata.json";

    model = await tmPose.load(modelURL, metadataURL);

    const stream =
        await navigator.mediaDevices.getUserMedia({
            video:true
        });

    webcamVideo = document.getElementById("webcam");
    webcamVideo.srcObject = stream;

    webcamVideo.onloadeddata = () => {
        loop();
    };
}

async function loop(){

    const {posenetOutput} =
        await model.estimatePose(webcamVideo);

    const prediction =
        await model.predict(posenetOutput);

    let bestClass = "";
    let bestProb = 0;

    prediction.forEach(p => {

        if(p.probability > bestProb){
            bestProb = p.probability;
            bestClass = p.className;
        }

    });

    document.getElementById("prediction").innerHTML =
        bestClass + " (" +
        (bestProb*100).toFixed(1) +
        "%)";

    requestAnimationFrame(loop);
}

init();

</script>

</body>
</html>
